<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>

    <title> Calculator</title>
</head>

<body class="bg-sky-800 h-[100vh] w-[100vw] flex justify-center items-center">
    <div class="calculator flex justify-center items-center w-[340px] h-[450px] bg-sky-900 rounded-xl">

        <div class="container bg-sky-950 h-[377px] w-[300px] rounded-md">
            <div class="show-box m-auto bg-sky-400 w-[290px] h-[70px] mt-1 text-3xl font-semibold text-right">
<div class="mr-2 result">0</div>
            </div>
            <div class="btn-box  grid grid-cols-4 gap-1  w-[296px] h-[305px] m-auto mt-1 ml-1">


                <button class="btn rounded-xl w-[68px] h-[55px] bg-red-600 text-lg font-bold">AC</button>
                <button class="btn rounded-xl w-[68px] h-[55px] bg-red-600 text-lg font-bold">Del</button>
                <button class="btn rounded-xl w-[68px] h-[55px] bg-red-600 text-3xl font-bold">%</button>
                <button class="btn rounded-xl w-[68px] h-[55px] bg-red-600 text-3xl font-bold">÷</button>

                <button class="btn rounded-xl w-[68px] h-[55px] bg-red-600 text-lg font-bold num">9</button>
                <button class="btn rounded-xl w-[68px] h-[55px] bg-red-600 text-lg font-bold num">8</button>
                <button class="btn rounded-xl w-[68px] h-[55px] bg-red-600 text-lg font-bold num">7</button>
                <button class="btn rounded-xl w-[68px] h-[55px] bg-red-600 text-3xl font-bold num">×</button>

                <button class="btn rounded-xl w-[68px] h-[55px] bg-red-600 text-lg font-bold num">6</button>
                <button class="btn rounded-xl w-[68px] h-[55px] bg-red-600 text-lg font-bold num">5</button>
                <button class="btn rounded-xl w-[68px] h-[55px] bg-red-600 text-lg font-bold num">4</button>
                <button class="btn rounded-xl w-[68px] h-[55px] bg-red-600 text-3xl font-bold num">-</button>

                <button class="btn rounded-xl w-[68px] h-[55px] bg-red-600 text-lg font-bold">3</button>
                <button class="btn rounded-xl w-[68px] h-[55px] bg-red-600 text-lg font-bold">2</button>
                <button class="btn rounded-xl w-[68px] h-[55px] bg-red-600 text-lg font-bold">1</button>
                <button class="btn rounded-xl w-[68px] h-[114px]  bg-red-600 text-3xl row-span-2 font-bold">+</button>
                
                <button class="btn rounded-xl w-[68px] h-[55px] bg-red-600 text-3xl font-bold">.</button>
                <button class="btn rounded-xl w-[68px] h-[55px] bg-red-600 text-lg font-bold">0</button>
                <button class="btn rounded-xl w-[68px] h-[55px] bg-red-600 text-3xl font-bold">=</button>

            </div>
        </div>

    </div>
 <script src="script.js"></script>
</body>


</html>
